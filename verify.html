<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>RoadWatch • Verify Account</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&family=Outfit:wght@500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/notyf@3/notyf.min.css">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='16' fill='%231e3a8a'/%3E%3Cpath d='M20 44V20l12 9-12 9zm4-12l0 0zM36 20h8v4h-8zm0 8h8v4h-8zm0 8h8v4h-8z' fill='%23f0f9ff'/%3E%3Ccircle cx='48' cy='48' r='12' fill='%23dc2626'/%3E%3Cpath d='M44 48h3v3h-3zm4-2v2h-3v-2h3zm-2 4v2h-2v-2h2zm0-6v2h-2v-2h2z' fill='%23ffffff'/%3E%3C/svg%3E">
    <link rel="stylesheet" href="scripts/css/verify.css">
</head>
<body>
    <div class="floating-shapes">
        <div class="shape shape-circle-blue"></div>
        <div class="shape shape-circle-red"></div>
        <div class="shape shape-diamond-red"></div>
        <div class="shape shape-square-blue"></div>
        <div class="shape shape-triangle-blue"></div>
        <div class="shape shape-ring-red"></div>
        <div class="shape shape-dot-blue"></div>
        <div class="shape shape-dot-red"></div>
    </div>

    <div class="verify-wrapper">
        <div class="brand-card" id="skeletonLoader">
            <div class="skeleton skeleton-brand"></div>
            <div class="skeleton skeleton-icon"></div>
            <div class="skeleton skeleton-title"></div>
            <div class="skeleton skeleton-text" style="width: 80%; margin: 0 auto 1rem;"></div>
            <div class="skeleton skeleton-text-sm" style="width: 60%; margin: 0 auto 1.5rem;"></div>
            <div style="display: flex; gap: 0.5rem; justify-content: center; margin-bottom: 1.5rem;">
                <div class="skeleton skeleton-otp"></div>
                <div class="skeleton skeleton-otp"></div>
                <div class="skeleton skeleton-otp"></div>
                <div class="skeleton skeleton-otp"></div>
                <div class="skeleton skeleton-otp"></div>
                <div class="skeleton skeleton-otp"></div>
            </div>
            <div class="skeleton skeleton-text-sm" style="width: 40%; margin: 0 auto 1rem;"></div>
            <div class="skeleton skeleton-button"></div>
            <div class="skeleton skeleton-button-sm"></div>
        </div>

        <div class="brand-card" id="mainContent">
            <div class="blog-brand">
                Road<span class="accent-word">Watch</span> <span class="location-tag">Mandaue</span>
            </div>

            <div class="verify-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <rect x="3" y="11" width="18" height="11" rx="2" ry="2" />
                    <path d="M7 11V7a5 5 0 0 1 10 0v4" />
                    <circle cx="12" cy="16" r="1" />
                </svg>
            </div>

            <div class="verify-title">Verify Your Account</div>
            <div class="verify-description">
                We sent a 6-digit verification code to<br>
                <strong id="userEmail">your email</strong>
            </div>

            <div class="otp-input-group" id="otpGroup">
                <input type="text" class="otp-input" maxlength="1" id="otp1" inputmode="numeric" pattern="[0-9]" autocomplete="one-time-code">
                <input type="text" class="otp-input" maxlength="1" id="otp2" inputmode="numeric" pattern="[0-9]">
                <input type="text" class="otp-input" maxlength="1" id="otp3" inputmode="numeric" pattern="[0-9]">
                <input type="text" class="otp-input" maxlength="1" id="otp4" inputmode="numeric" pattern="[0-9]">
                <input type="text" class="otp-input" maxlength="1" id="otp5" inputmode="numeric" pattern="[0-9]">
                <input type="text" class="otp-input" maxlength="1" id="otp6" inputmode="numeric" pattern="[0-9]">
            </div>

            <div class="timer-text" id="timerText">
                Code expires in <span id="countdown">05:00</span>
            </div>

            <button class="btn-verify" id="verifyButton" onclick="verifyOTP()">
                <span class="spinner" id="verifySpinner"></span>
                <span id="verifyText">Verify Account</span>
            </button>

            <button class="btn-resend" id="resendButton" onclick="resendOTP()" disabled>
                <span class="spinner-dark" id="resendSpinner"></span>
                <span id="resendText">Resend Code</span>
            </button>
        </div>

        <div class="footer-text" id="footerContent">
            Powered by <a href="https://www.facebook.com/novatex.studios.ph" target="_blank" rel="noopener noreferrer" class="footer-link">NovateX Studios</a>
            <span class="version-badge">v1.7.0b</span>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/notyf@3/notyf.min.js"></script>
    <script src="scripts/js/check_session.js"></script>
    <script src="scripts/js/verify.js"></script>
</body>
</html>
