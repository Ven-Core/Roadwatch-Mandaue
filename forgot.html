<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>RoadWatch • Forgot Password</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&family=Outfit:wght@500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/notyf@3/notyf.min.css">
    <link rel="icon" type="image/svg+xml"
        href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='16' fill='%231e3a8a'/%3E%3Cpath d='M20 44V20l12 9-12 9zm4-12l0 0zM36 20h8v4h-8zm0 8h8v4h-8zm0 8h8v4h-8z' fill='%23f0f9ff'/%3E%3Ccircle cx='48' cy='48' r='12' fill='%23dc2626'/%3E%3Cpath d='M44 48h3v3h-3zm4-2v2h-3v-2h3zm-2 4v2h-2v-2h2zm0-6v2h-2v-2h2z' fill='%23ffffff'/%3E%3C/svg%3E">
    <link rel="stylesheet" href="scripts/css/forgot.css">
</head>

<body>
    <div class="floating-shapes">
        <div class="shape shape-circle-blue"></div>
        <div class="shape shape-circle-red"></div>
        <div class="shape shape-diamond-red"></div>
        <div class="shape shape-square-blue"></div>
        <div class="shape shape-triangle-blue"></div>
        <div class="shape shape-ring-red"></div>
        <div class="shape shape-dot-blue"></div>
        <div class="shape shape-dot-red"></div>
    </div>

    <div class="forgot-wrapper">
        <div class="brand-card" id="skeletonLoader">
            <div class="skeleton skeleton-brand"></div>
            <div style="display:flex;align-items:center;justify-content:center;margin:2rem 0;gap:0.5rem;">
                <div style="display:flex;flex-direction:column;align-items:center;">
                    <div class="skeleton skeleton-circle"></div>
                    <div class="skeleton skeleton-label"></div>
                </div>
                <div class="skeleton skeleton-line"></div>
                <div style="display:flex;flex-direction:column;align-items:center;">
                    <div class="skeleton skeleton-circle"></div>
                    <div class="skeleton skeleton-label"></div>
                </div>
                <div class="skeleton skeleton-line"></div>
                <div style="display:flex;flex-direction:column;align-items:center;">
                    <div class="skeleton skeleton-circle"></div>
                    <div class="skeleton skeleton-label"></div>
                </div>
            </div>
            <div class="skeleton skeleton-input"></div>
            <div class="skeleton skeleton-button"></div>
            <div style="text-align:center;margin-top:1rem;">
                <div class="skeleton skeleton-text" style="width:40%;margin:0 auto;"></div>
            </div>
        </div>

        <div class="brand-card" id="mainContent">
            <div class="blog-brand">
                Road<span class="accent-word">Watch</span> <span class="location-tag">Mandaue</span>
            </div>

            <div class="steps-container">
                <div class="step-item">
                    <div class="step-circle active" id="circle1">1</div>
                    <div class="step-label active" id="label1">Email</div>
                </div>
                <div class="step-line" id="line1"></div>
                <div class="step-item">
                    <div class="step-circle" id="circle2">2</div>
                    <div class="step-label" id="label2">Verify</div>
                </div>
                <div class="step-line" id="line2"></div>
                <div class="step-item">
                    <div class="step-circle" id="circle3">3</div>
                    <div class="step-label" id="label3">Reset</div>
                </div>
            </div>

            <div class="step-content active" id="step1Content">
                <p style="text-align:center;font-size:0.82rem;color:#64748b;margin-bottom:1.5rem;">Enter your email
                    address to receive a verification code</p>
                <div class="input-field-google">
                    <label class="google-label">Email Address</label>
                    <input type="email" class="google-input" id="resetEmail" autocomplete="email" required>
                </div>
                <button class="btn-primary" id="sendOtpBtn" onclick="sendResetOTP()">
                    <span class="spinner" id="sendOtpSpinner"></span>
                    <span id="sendOtpText">Send Verification Code</span>
                </button>
            </div>

            <div class="step-content" id="step2Content">
                <p style="text-align:center;font-size:0.82rem;color:#64748b;margin-bottom:1.5rem;">Enter the 6-digit
                    code sent to <strong id="displayEmail"></strong></p>
                <div class="otp-input-group">
                    <input type="text" class="otp-input" maxlength="1" id="rotp1" inputmode="numeric" pattern="[0-9]">
                    <input type="text" class="otp-input" maxlength="1" id="rotp2" inputmode="numeric" pattern="[0-9]">
                    <input type="text" class="otp-input" maxlength="1" id="rotp3" inputmode="numeric" pattern="[0-9]">
                    <input type="text" class="otp-input" maxlength="1" id="rotp4" inputmode="numeric" pattern="[0-9]">
                    <input type="text" class="otp-input" maxlength="1" id="rotp5" inputmode="numeric" pattern="[0-9]">
                    <input type="text" class="otp-input" maxlength="1" id="rotp6" inputmode="numeric" pattern="[0-9]">
                </div>
                <div class="timer-text" id="timerText">Code expires in <span id="countdown">05:00</span></div>
                <button class="btn-primary" id="verifyOtpBtn" onclick="verifyResetOTP()">
                    <span class="spinner" id="verifyOtpSpinner"></span>
                    <span id="verifyOtpText">Verify Code</span>
                </button>
                <button class="btn-secondary" id="resendOtpBtn" onclick="resendResetOTP()" disabled>Resend Code</button>
            </div>

            <div class="step-content" id="step3Content">
                <p style="text-align:center;font-size:0.82rem;color:#64748b;margin-bottom:1.5rem;">Enter your new
                    password</p>
                <div class="input-field-google">
                    <label class="google-label">New Password</label>
                    <input type="password" class="google-input" id="newPassword" autocomplete="new-password" required
                        minlength="6">
                    <div class="password-toggle-wrapper">
                        <button type="button" class="toggle-password-btn" id="toggleNewPasswordBtn">
                            <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2">
                                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                                <circle cx="12" cy="12" r="3"></circle>
                            </svg>
                        </button>
                    </div>
                </div>
                <div class="input-field-google">
                    <label class="google-label">Confirm New Password</label>
                    <input type="password" class="google-input" id="confirmNewPassword" autocomplete="new-password"
                        required minlength="6">
                    <div class="password-toggle-wrapper">
                        <button type="button" class="toggle-password-btn" id="toggleConfirmPasswordBtn">
                            <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2">
                                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                                <circle cx="12" cy="12" r="3"></circle>
                            </svg>
                        </button>
                    </div>
                </div>
                <button class="btn-primary" id="resetPasswordBtn" onclick="resetPassword()">
                    <span class="spinner" id="resetPasswordSpinner"></span>
                    <span id="resetPasswordText">Reset Password</span>
                </button>
            </div>

            <div class="back-link">
                <a href="login.html">Back to Sign in</a>
            </div>
        </div>

        <div class="footer-text">
            Powered by <a href="https://www.facebook.com/novatex.studios.ph" target="_blank" rel="noopener noreferrer"
                class="footer-link">NovateX Studios</a>
            <span class="version-badge">v1.7.0b</span>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/notyf@3/notyf.min.js"></script>
    <script src="scripts/js/forgot.js"></script>
</body>

</html>
