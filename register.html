<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>RoadWatch • Mandaue</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&family=Outfit:wght@500;600;700&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/notyf@3/notyf.min.css">
  <link rel="icon" type="image/svg+xml"
    href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='16' fill='%231e3a8a'/%3E%3Cpath d='M20 44V20l12 9-12 9zm4-12l0 0zM36 20h8v4h-8zm0 8h8v4h-8zm0 8h8v4h-8z' fill='%23f0f9ff'/%3E%3Ccircle cx='48' cy='48' r='12' fill='%23dc2626'/%3E%3Cpath d='M44 48h3v3h-3zm4-2v2h-3v-2h3zm-2 4v2h-2v-2h2zm0-6v2h-2v-2h2z' fill='%23ffffff'/%3E%3C/svg%3E">
  <link rel="stylesheet" href="scripts/css/register.css">
</head>

<body>
  <div class="floating-shapes">
    <div class="shape shape-circle-blue"></div>
    <div class="shape shape-circle-red"></div>
    <div class="shape shape-diamond-red"></div>
    <div class="shape shape-square-blue"></div>
    <div class="shape shape-triangle-blue"></div>
    <div class="shape shape-ring-red"></div>
    <div class="shape shape-dot-blue"></div>
    <div class="shape shape-dot-red"></div>
  </div>

  <div class="register-wrapper">
    <div class="brand-card" id="skeletonLoader">
      <div class="skeleton skeleton-brand"></div>
      <div class="skeleton skeleton-tagline"></div>
      <div class="skeleton skeleton-button"></div>
      <div class="skeleton skeleton-button"></div>
      <div style="text-align: center; margin-top: 1.2rem;">
        <div class="skeleton skeleton-text" style="width: 60%; margin: 0 auto;"></div>
      </div>
    </div>

    <div class="brand-card" id="mainContent">
      <div class="blog-brand">
        Road<span class="accent-word">Watch</span> <span class="location-tag">Mandaue</span>
      </div>
      <div class="tagline">Alang sa Luwas nga Dalan</div>

      <div class="choice-buttons" id="choiceButtons">
        <button class="choice-btn email-btn" onclick="showEmailForm()">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="2" y="4" width="20" height="16" rx="2" />
            <path d="M22 4L12 13 2 4" />
          </svg>
          Sign up with Email
        </button>
        <button class="choice-btn google-btn" onclick="showGoogleForm()">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="#4285F4">
            <path
              d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" />
            <path
              d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" />
            <path
              d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" />
            <path
              d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" />
          </svg>
          Sign up with Google
        </button>
      </div>

      <button class="back-btn" id="backBtn" onclick="goBack()">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="15 18 9 12 15 6" />
        </svg>
        Back to options
      </button>

      <div class="register-form-section" id="emailFormSection">
        <form id="registerForm">
          <div class="input-row">
            <div class="input-field-google">
              <label class="google-label">Full Name</label>
              <input type="text" class="google-input" id="regFullName" autocomplete="name" required>
            </div>
            <div class="input-field-google">
              <label class="google-label">Username</label>
              <input type="text" class="google-input" id="regUsername" autocomplete="username" required>
            </div>
          </div>
          <div class="input-field-google">
            <label class="google-label">Email</label>
            <input type="email" class="google-input" id="regEmail" autocomplete="email" required>
          </div>
          <div class="input-row">
            <div class="input-field-google">
              <label class="google-label">Password</label>
              <input type="password" class="google-input password-field" id="regPassword" autocomplete="new-password"
                required minlength="6">
              <div class="password-toggle-wrapper">
                <button type="button" class="toggle-password-btn" id="togglePasswordBtn">
                  <svg id="eyeIcon" width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                    stroke-width="2">
                    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                    <circle cx="12" cy="12" r="3"></circle>
                  </svg>
                </button>
              </div>
            </div>
            <div class="input-field-google">
              <label class="google-label">Confirm Password</label>
              <input type="password" class="google-input" id="regConfirmPassword" autocomplete="new-password" required
                minlength="6">
            </div>
          </div>
          <div class="terms-notice">
            By signing up you agree to the <a href="#" class="terms-link">Terms of Service</a> of RoadWatch Mandaue
          </div>
          <button type="submit" class="btn-register" id="registerButton">
            <span class="spinner" id="registerSpinner"></span>
            <span id="registerText">Create Account</span>
          </button>
        </form>
      </div>

      <div class="register-form-section" id="googleFormSection">
        <p style="font-size:0.85rem;color:#334155;margin-bottom:0.8rem;text-align:center;">Quick registration using
          Google</p>
        <div class="terms-notice">By continuing you agree to our Terms of Service</div>
        <button class="social-btn-google" onclick="registerWithGoogle()">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="#4285F4">
            <path
              d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" />
            <path
              d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" />
            <path
              d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" />
            <path
              d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" />
          </svg>
          Sign up with Google
        </button>
      </div>

      <br>
        <div class="cf-turnstile" data-sitekey="0x4AAAAAADXAa8-8-BYhnQop" style="display:flex;justify-content:center;"
          data-theme="light" data-callback="turnstileCallback">
        </div>

      <div class="login-prompt">
        Already have an account? <a href="login.html" class="login-link">Sign in</a>
      </div>
      <br>
    </div>

    <div class="footer-text">
      Powered by <a href="https://www.facebook.com/novatex.studios.ph" target="_blank" rel="noopener noreferrer"
        class="footer-link">NovateX Studios</a>
      <span class="version-badge">v1.7.0b</span>
    </div>
  </div>

  <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/notyf@3/notyf.min.js"></script>
  <script src="scripts/js/check_session.js"></script>
  <script src="scripts/js/register.js"></script>
</body>

</html>
